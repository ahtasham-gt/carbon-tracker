name: Build and Push Docker Images

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ✅ updated

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Backend
      - name: Build Backend
        run: docker build -t ahte786/carbon-backend ./server

      - name: Push Backend
        run: docker push ahte786/carbon-backend

      # Frontend
      - name: Build Frontend
        run: docker build -t ahte786/carbon-frontend ./client

      - name: Push Frontend
        run: docker push ahte786/carbon-frontend